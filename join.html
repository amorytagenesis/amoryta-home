<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Become an Amity</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
  <form id="joinForm">

<h1>🌱 Become an Amity</h1>

<p>
Every great community begins with one decision.
Today, that decision could be yours.
</p>

<h3>📷 Your Journey Portrait</h3>

<input
type="text"
id="name"
placeholder="What should fellow Amities call you?"
required>

<br><br>

<input
type="tel"
id="phone"
placeholder="WhatsApp Number"
required>
    
<br><br>

<input
type="password"
id="passkey"
placeholder="Create Your PASSKEY"
required>

<br><br>

<h3>🎨 Choose Your Team</h3>

<select id="team">

<option>🤍 ALPHA</option>

<option>💛 TRENDSETTER</option>

<option>💙 INNOVATOR</option>

<option>💜 VISIONARY</option>

<option>🤎 MAVERICK</option>

<option>🧡 TRAILBLAZER</option>

<option>💚 CULTIVATOR</option>

<option>❤️ CATALYST</option>

<option>🖤 GUARDIAN</option>

</select>

<br><br>

<h3>🪣 Drop Your Bucket Message</h3>

<textarea
id="bucket" rows="6" placeholder="Leave an idea, encouragement, opportunity, support, dream, challenge or vision."></textarea>

<br><br>

<label>

<input
type="checkbox"
id="constitution"
required>

I agree to the Constitution

</label>

<br><br>

<button>

🌱 Begin My Journey

<button type="submit">

<br><br><br>

<p>

Already an Amity?

<a href="index.html">🏡 Welcome Back</a>

</p>

</form>
</div>

</body>

</html>

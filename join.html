<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Become an Amity • AMORYTA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<form id="joinForm">

<h1>🌱 Become an Amity</h1>

<p>
Every great community begins with one decision.
Today, that decision could be yours.
</p>

<hr>

<h3>
🪪 Create Your Identity
</h3>

<input
type="text"
id="username"
placeholder="Choose a permanent Username"
required>

<br><br>

<input
type="text"
id="displayName"
placeholder="Display Name (shown to other Amities)"
required>

<br><br>

<input
type="tel"
id="phone"
placeholder="WhatsApp Number"
required>

<br><br>

<input
type="password"
id="passkey"
placeholder="Create Your PASSKEY"
required>

<br><br>

<h3>🎨 Choose Your Team</h3>

<select id="team" required>

<option value="">-- Select Your Team --</option>

<option value="ALPHA">🤍 ALPHA</option>

<option value="TRENDSETTER">💛 TRENDSETTER</option>

<option value="INNOVATOR">💙 INNOVATOR</option>

<option value="VISIONARY">💜 VISIONARY</option>

<option value="MAVERICK">🤎 MAVERICK</option>

<option value="TRAILBLAZER">🧡 TRAILBLAZER</option>

<option value="CULTIVATOR">💚 CULTIVATOR</option>

<option value="CATALYST">❤️ CATALYST</option>

<option value="GUARDIAN">🖤 GUARDIAN</option>

</select>

<br><br>

<h3>🪣 Your First Bucket Message</h3>

<textarea
id="bucket"
rows="6"
placeholder="Share an idea, dream, encouragement, opportunity or vision..."
required></textarea>

<br><br>

<label>

<input
type="checkbox"
id="constitution"
required>

I agree to the AMORYTA Constitution.

</label>

<br><br>

<button type="submit">

🌱 Begin My Journey

</button>

<br><br><br>

<p>

Already an Amity?

<a href="index.html">🏡 Welcome Back</a>

</p>

</form>

</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>

</body>

</html>
